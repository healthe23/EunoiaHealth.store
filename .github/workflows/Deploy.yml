name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Update from v3 to v4

      # If you need to build your site (for dynamic content or frameworks)
      - name: Build the project
        run: |
          # Replace this comment with your actual build command if you're using a framework like React
          echo "No build needed for static site" || exit 0  # For static sites with no build step

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1  # Check if there's a v2 or later that supports Node.js 20
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}  # Standardize to this name
          accountId: ${{ secrets.CF_ACCOUNT_ID }}  # Standardize to this name
          projectName: your-project-name  # Replace with your actual project name
          directory: ./  # or adjust to where your built files are
