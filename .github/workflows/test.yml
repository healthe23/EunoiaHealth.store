name: Run Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated from v3 to v4

      - name: Set up Node.js
        uses: actions/setup-node@v4  # Updated from v3 to v4
        with:
          node-version: '20'  # Changed to Node.js version 20

      - name: Install dependencies
        run: npm ci  # npm ci is recommended for consistent installs in CI

      - name: Run tests
        run: npm test
        continue-on-error: true  # This will allow the workflow to continue if tests fail
