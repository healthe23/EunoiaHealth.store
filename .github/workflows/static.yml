name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main  # Replace with your default branch name if different

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'  # Assuming you need Node.js 16 for your project

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: |
          # Adjust the build command if needed
          # For static sites without build command: 
          #   echo "No build needed"
          # For Next.js with static export:
          npm run build && npm run export

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: your-project-name  # Replace with your project name on Cloudflare Pages
          directory: ./out  # Directory where your built files are, adjust as necessary
          # gitHubToken: ${{ secrets.GITHUB_TOKEN }}  # Uncomment if you need this for GitHub integration
